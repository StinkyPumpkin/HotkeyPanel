<?xml version="1.0" encoding="UTF-8"?>
<!-- Hotkey Panel — square thumbnail (512x512) -->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 512 512"
     width="512" height="512"
     font-family="'EB Garamond','Palatino Linotype',Georgia,serif">

  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="55%" r="80%">
      <stop offset="0%"  stop-color="#1a1828"/>
      <stop offset="55%" stop-color="#0c0a14"/>
      <stop offset="100%" stop-color="#050407"/>
    </radialGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#f4d98a"/>
      <stop offset="48%" stop-color="#d6b35a"/>
      <stop offset="100%" stop-color="#8a6c2e"/>
    </linearGradient>
    <linearGradient id="keyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#3a3850"/>
      <stop offset="100%" stop-color="#181624"/>
    </linearGradient>
    <linearGradient id="keyHotGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffe9a0"/>
      <stop offset="50%" stop-color="#e6c060"/>
      <stop offset="100%" stop-color="#a37820"/>
    </linearGradient>
    <radialGradient id="hotHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#f4d98a" stop-opacity="0.55"/>
      <stop offset="60%"  stop-color="#c9a961" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c9a961" stop-opacity="0"/>
    </radialGradient>
    <filter id="titleGlow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background + frame -->
  <rect width="512" height="512" fill="url(#bgGrad)"/>
  <rect x="10" y="10" width="492" height="492"
        fill="none" stroke="url(#goldGrad)" stroke-width="2" opacity="0.9"/>

  <!-- Corner diamonds -->
  <g fill="#c9a961">
    <rect x="30" y="30" width="12" height="12" transform="rotate(45 36 36)"/>
    <rect x="470" y="30" width="12" height="12" transform="rotate(45 476 36)"/>
    <rect x="30" y="470" width="12" height="12" transform="rotate(45 36 476)"/>
    <rect x="470" y="470" width="12" height="12" transform="rotate(45 476 476)"/>
  </g>

  <!-- Title -->
  <g filter="url(#titleGlow)">
    <text x="256" y="115"
          text-anchor="middle"
          font-size="56" font-weight="600"
          letter-spacing="8"
          fill="url(#goldGrad)">HOTKEY</text>
    <text x="256" y="175"
          text-anchor="middle"
          font-size="56" font-weight="600"
          letter-spacing="10"
          fill="url(#goldGrad)">PANEL</text>
  </g>

  <line x1="180" y1="205" x2="332" y2="205" stroke="#c9a961" stroke-width="1" opacity="0.55"/>
  <rect x="252" y="201" width="8" height="8" transform="rotate(45 256 205)" fill="#c9a961" opacity="0.7"/>

  <!-- Halo behind F11 -->
  <ellipse cx="256" cy="310" rx="140" ry="80" fill="url(#hotHalo)"/>

  <!-- Three keys: Esc, F11 (hot), Tab -->
  <!-- Esc @ x=88, F11 @ x=200, Tab @ x=312, each 100×100 -->
  <g>
    <rect x="88" y="260" width="100" height="100" rx="8"
          fill="url(#keyGrad)" stroke="#5a5470" stroke-width="2"/>
    <rect x="93" y="265" width="90" height="44" rx="6" fill="#ffffff" fill-opacity="0.06"/>
    <text x="138" y="332" text-anchor="middle" font-size="34"
          fill="#c4b08a" letter-spacing="1">Esc</text>

    <rect x="312" y="260" width="100" height="100" rx="8"
          fill="url(#keyGrad)" stroke="#5a5470" stroke-width="2"/>
    <rect x="317" y="265" width="90" height="44" rx="6" fill="#ffffff" fill-opacity="0.06"/>
    <text x="362" y="332" text-anchor="middle" font-size="34"
          fill="#c4b08a" letter-spacing="1">Tab</text>
  </g>

  <!-- F11 highlighted -->
  <g>
    <rect x="196" y="255" width="120" height="110" rx="10"
          fill="none" stroke="#f4d98a" stroke-width="1" opacity="0.4"/>
    <rect x="200" y="260" width="112" height="100" rx="8"
          fill="url(#keyHotGrad)" stroke="#fff0b0" stroke-width="3"/>
    <rect x="205" y="265" width="102" height="44" rx="6" fill="#ffffff" fill-opacity="0.22"/>
    <text x="256" y="332" text-anchor="middle" font-size="38"
          fill="#1a140a" font-weight="700" letter-spacing="1">F11</text>
  </g>

  <!-- Subtitle + footer -->
  <text x="256" y="425"
        text-anchor="middle"
        font-size="16" letter-spacing="6"
        fill="#c9a961" opacity="0.85">
    REMEMBER EVERY BIND
  </text>
  <line x1="160" y1="450" x2="352" y2="450" stroke="#c9a961" stroke-width="0.5" opacity="0.4"/>
  <text x="256" y="478"
        text-anchor="middle"
        font-size="11" letter-spacing="4"
        fill="#7a6a45" opacity="0.7">
    SKSE · PRISMA UI
  </text>

</svg>
